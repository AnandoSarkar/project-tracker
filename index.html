<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Tracker</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --ink: #172b4d;
    --muted: #6b778c;
    --line: #dfe1e6;
    --accent: #0c66e4;
    --accent-soft: #e9f2ff;
    --green: #1f845a;
    --amber: #b25e02;
    --red: #ca3521;
    --shadow: 0 1px 3px rgba(9, 30, 66, 0.13);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.45;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    padding: 18px 24px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 24px; }

  /* View tabs (wired up for future Kanban / Calendar / Gantt) */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab[disabled] { opacity: .5; cursor: not-allowed; }
  .tab .soon { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; margin-left: 6px; }

  /* Add-task form */
  .add-form {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 150px 130px auto;
    gap: 10px;
    margin-bottom: 20px;
  }
  .add-form input, .add-form select {
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  .add-form input:focus, .add-form select:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn:hover { filter: brightness(1.05); }
  @media (max-width: 640px) {
    .add-form { grid-template-columns: 1fr 1fr; }
    .add-form input:first-child { grid-column: 1 / -1; }
  }

  /* Filter / sort bar */
  .controls { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .controls label { font-size: 13px; color: var(--muted); }
  .controls select { padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; font-size: 13px; font-family: inherit; }
  .count { margin-left: auto; font-size: 13px; color: var(--muted); }

  /* Task cards */
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .task.todo { border-left-color: var(--muted); }
  .task.doing { border-left-color: var(--amber); }
  .task.done { border-left-color: var(--green); }
  .task input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
  .task .body { flex: 1; min-width: 0; }
  .task .title { font-size: 15px; font-weight: 500; word-break: break-word; }
  .task.done .title { text-decoration: line-through; color: var(--muted); }
  .task .meta { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill.todo { background: #ebecf0; color: var(--muted); }
  .pill.doing { background: #fff0e6; color: var(--amber); }
  .pill.done { background: #dcfff1; color: var(--green); }
  .due.overdue { color: var(--red); font-weight: 600; }
  .task select { padding: 4px 6px; border: 1px solid var(--line); border-radius: 6px; font-size: 12px; font-family: inherit; }
  .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; line-height: 1; }
  .del:hover { color: var(--red); }

  .empty { text-align: center; color: var(--muted); padding: 50px 20px; border: 2px dashed var(--line); border-radius: 8px; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
</style>
</head>
<body>
  <header>
    <h1>📋 Project Tracker</h1>
    <p>A simple task tracker that saves to your browser. No login, no server.</p>
  </header>

  <div class="wrap">
    <!-- View switcher: List works now; others are stubbed for later -->
    <div class="tabs" id="tabs">
      <button class="tab active" data-view="list">List</button>
      <button class="tab" data-view="kanban" disabled>Kanban<span class="soon">soon</span></button>
      <button class="tab" data-view="calendar" disabled>Calendar<span class="soon">soon</span></button>
      <button class="tab" data-view="gantt" disabled>Gantt<span class="soon">soon</span></button>
    </div>

    <!-- LIST VIEW -->
    <section id="view-list">
      <form class="add-form" id="addForm">
        <input type="text" id="titleInput" placeholder="New task…" required />
        <input type="date" id="dueInput" title="Due date" />
        <select id="statusInput" title="Status">
          <option value="todo">To Do</option>
          <option value="doing">In Progress</option>
          <option value="done">Done</option>
        </select>
        <button class="btn" type="submit">Add</button>
      </form>

      <div class="controls">
        <label for="filterStatus">Filter:</label>
        <select id="filterStatus">
          <option value="all">All</option>
          <option value="todo">To Do</option>
          <option value="doing">In Progress</option>
          <option value="done">Done</option>
        </select>
        <label for="sortBy">Sort:</label>
        <select id="sortBy">
          <option value="created">Newest first</option>
          <option value="due">Due date</option>
          <option value="title">Title (A–Z)</option>
        </select>
        <span class="count" id="count"></span>
      </div>

      <div class="task-list" id="taskList"></div>
    </section>
  </div>

  <footer>Built as a learning project · data stored locally in your browser</footer>

<script>
/* ---------------------------------------------------------
   Project Tracker — vanilla JS, localStorage persistence
   Structured so new views (kanban/calendar/gantt) plug in
   by adding a render function + enabling the tab.
--------------------------------------------------------- */

const STORE_KEY = "projectTracker.tasks.v1";

// --- State ---
let tasks = load();
let currentView = "list";

// --- Persistence ---
function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    console.warn("Could not load tasks:", e);
    return [];
  }
}
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(tasks));
}

// --- Helpers ---
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}
const STATUS_LABEL = { todo: "To Do", doing: "In Progress", done: "Done" };

// --- CRUD ---
function addTask(title, due, status) {
  tasks.push({
    id: uid(),
    title: title.trim(),
    due: due || "",
    status: status || "todo",
    created: Date.now(),
  });
  save();
  render();
}
function updateTask(id, changes) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  Object.assign(t, changes);
  save();
  render();
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

// --- Rendering (List view) ---
function renderList() {
  const listEl = document.getElementById("taskList");
  const filter = document.getElementById("filterStatus").value;
  const sortBy = document.getElementById("sortBy").value;

  let rows = tasks.slice();
  if (filter !== "all") rows = rows.filter(t => t.status === filter);

  rows.sort((a, b) => {
    if (sortBy === "due") {
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    }
    if (sortBy === "title") return a.title.localeCompare(b.title);
    return b.created - a.created; // newest first
  });

  document.getElementById("count").textContent =
    tasks.length + (tasks.length === 1 ? " task" : " tasks");

  if (rows.length === 0) {
    listEl.innerHTML = '<div class="empty">No tasks here yet. Add one above to get started! 🚀</div>';
    return;
  }

  const today = todayStr();
  listEl.innerHTML = "";
  rows.forEach(t => {
    const card = document.createElement("div");
    card.className = "task " + t.status;

    const overdue = t.due && t.due < today && t.status !== "done";

    card.innerHTML = `
      <input type="checkbox" ${t.status === "done" ? "checked" : ""} aria-label="Mark done" />
      <div class="body">
        <div class="title"></div>
        <div class="meta">
          <span class="pill ${t.status}">${STATUS_LABEL[t.status]}</span>
          ${t.due ? `<span class="due ${overdue ? "overdue" : ""}">📅 ${fmtDate(t.due)}${overdue ? " · overdue" : ""}</span>` : ""}
        </div>
      </div>
      <select aria-label="Change status">
        <option value="todo">To Do</option>
        <option value="doing">In Progress</option>
        <option value="done">Done</option>
      </select>
      <button class="del" aria-label="Delete task" title="Delete">✕</button>
    `;

    // Safe text insertion (avoids HTML injection from task titles)
    card.querySelector(".title").textContent = t.title;
    card.querySelector("select").value = t.status;

    // Wire events
    card.querySelector('input[type="checkbox"]').addEventListener("change", e => {
      updateTask(t.id, { status: e.target.checked ? "done" : "todo" });
    });
    card.querySelector("select").addEventListener("change", e => {
      updateTask(t.id, { status: e.target.value });
    });
    card.querySelector(".del").addEventListener("click", () => {
      if (confirm("Delete this task?")) deleteTask(t.id);
    });

    listEl.appendChild(card);
  });
}

// --- View router (extend here for future views) ---
const VIEWS = {
  list: renderList,
  // kanban: renderKanban,
  // calendar: renderCalendar,
  // gantt: renderGantt,
};
function render() {
  (VIEWS[currentView] || renderList)();
}

// --- Event wiring ---
document.getElementById("addForm").addEventListener("submit", e => {
  e.preventDefault();
  const title = document.getElementById("titleInput").value;
  const due = document.getElementById("dueInput").value;
  const status = document.getElementById("statusInput").value;
  if (!title.trim()) return;
  addTask(title, due, status);
  e.target.reset();
  document.getElementById("titleInput").focus();
});

document.getElementById("filterStatus").addEventListener("change", render);
document.getElementById("sortBy").addEventListener("change", render);

document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab");
  if (!btn || btn.disabled) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  currentView = btn.dataset.view;
  render();
});

// --- Seed a couple of sample tasks on first ever visit ---
if (tasks.length === 0 && !localStorage.getItem(STORE_KEY)) {
  const t = todayStr();
  tasks = [
    { id: uid(), title: "Welcome! Edit or delete me 👋", due: t, status: "todo", created: Date.now() },
    { id: uid(), title: "Try marking a task as done", due: "", status: "doing", created: Date.now() - 1 },
  ];
  save();
}

render();
</script>
</body>
</html>
